server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    # Sem index.html: lista os arquivos da pasta automaticamente.
    # Assim, qualquer arquivo novo colocado em apresentacoes/ aparece na listagem.
    autoindex on;
    autoindex_exact_size off;
    autoindex_localtime on;

    charset utf-8;

    location / {
        try_files $uri $uri/ =404;
    }

    # Cache leve para assets estaticos
    location ~* \.(?:css|js|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
